name: CampgroundLog
options:
  bundleIdPrefix: com.shimondeitel.camplog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CampgroundLog:
    type: application
    platform: iOS
    sources:
      - path: CampgroundLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.camplog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CampgroundLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CampgroundLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CampgroundLogTests
      - path: CampgroundLog.storekit
    dependencies:
      - target: CampgroundLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.camplog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CampgroundLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CampgroundLogUITests
    dependencies:
      - target: CampgroundLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.camplog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CampgroundLog:
    build:
      targets:
        CampgroundLog: all
        CampgroundLogTests: [test]
        CampgroundLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CampgroundLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CampgroundLog.storekit
      targets:
        - CampgroundLogTests
        - CampgroundLogUITests
    archive:
      config: Release
